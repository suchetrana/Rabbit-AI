name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ─── Backend ───────────────────────────────────────
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Build backend
        working-directory: ./backend
        run: npm run build

      # ─── Frontend ──────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      # ─── Docker Validation ─────────────────────────────
      - name: Docker build backend
        run: docker build -t rabbitt-backend ./backend

      - name: Docker build frontend
        run: docker build -t rabbitt-frontend ./frontend
